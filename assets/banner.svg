<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CSS Pro-Tips banner</title>
  <desc id="desc">A cinematic dark banner for a Baseline-aware CSS skill, with code-like panels and colored compatibility signals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111D"/>
      <stop offset="0.48" stop-color="#10221F"/>
      <stop offset="1" stop-color="#271D12"/>
    </linearGradient>
    <radialGradient id="signalA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1044 90) rotate(134) scale(360 240)">
      <stop stop-color="#E9B949" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#E9B949" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="signalB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(790 344) rotate(-153) scale(430 230)">
      <stop stop-color="#2DD4BF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#E5E7EB" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="34" fill="url(#signalA)"/>
  <rect width="1280" height="420" rx="34" fill="url(#signalB)"/>
  <rect width="1280" height="420" rx="34" fill="url(#grid)"/>

  <g opacity="0.6">
    <path d="M70 84H1210" stroke="#F8FAFC" stroke-opacity="0.1"/>
    <path d="M70 336H1210" stroke="#F8FAFC" stroke-opacity="0.1"/>
  </g>

  <g transform="translate(72 72)">
    <rect width="408" height="276" rx="24" fill="#08111D" fill-opacity="0.76" stroke="#D1D5DB" stroke-opacity="0.16" filter="url(#soft)"/>
    <rect x="20" y="20" width="368" height="236" rx="18" fill="#0D1A24" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="48" cy="48" r="6" fill="#F87171"/>
    <circle cx="70" cy="48" r="6" fill="#FBBF24"/>
    <circle cx="92" cy="48" r="6" fill="#34D399"/>
    <text x="42" y="94" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="650">:has(.modern-css)</text>
    <text x="42" y="130" fill="#E5E7EB" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">container-type: inline-size;</text>
    <text x="42" y="166" fill="#E5E7EB" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">@supports (anchor-name: --tip)</text>
    <text x="42" y="202" fill="#FDBA74" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">Baseline aware, not guesswork</text>
  </g>

  <g transform="translate(536 76)">
    <rect x="0" y="0" width="112" height="34" rx="17" fill="#D9F99D" fill-opacity="0.14" stroke="#BEF264" stroke-opacity="0.32"/>
    <text x="20" y="23" fill="#ECFCCB" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700">CSS SKILL</text>

    <text x="0" y="94" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="70" font-weight="850" letter-spacing="-2">CSS Pro-Tips</text>
    <text x="2" y="138" fill="#CBD5E1" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="520">Validated, Baseline-aware CSS guidance for AI coding agents.</text>

    <g transform="translate(0 178)">
      <rect width="174" height="52" rx="16" fill="#F8FAFC" fill-opacity="0.08" stroke="#F8FAFC" stroke-opacity="0.13"/>
      <text x="18" y="23" fill="#FDE68A" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">WIDELY</text>
      <text x="18" y="39" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">ship normally</text>
    </g>
    <g transform="translate(194 178)">
      <rect width="174" height="52" rx="16" fill="#F8FAFC" fill-opacity="0.08" stroke="#F8FAFC" stroke-opacity="0.13"/>
      <text x="18" y="23" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">NEWLY</text>
      <text x="18" y="39" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">verify floor</text>
    </g>
    <g transform="translate(388 178)">
      <rect width="184" height="52" rx="16" fill="#F8FAFC" fill-opacity="0.08" stroke="#F8FAFC" stroke-opacity="0.13"/>
      <text x="18" y="23" fill="#FDBA74" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">LIMITED</text>
      <text x="18" y="39" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">fallback first</text>
    </g>
  </g>
</svg>
